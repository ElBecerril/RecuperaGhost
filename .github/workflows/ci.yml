name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  lint:
    name: Formato y clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Instalar Rust (rustfmt + clippy)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy

      - name: Chequear formato
        run: cargo fmt --all --check

      - name: Clippy (sin warnings)
        run: cargo clippy --release --locked --all-targets -- -D warnings

  test:
    name: Tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-gnu
            os: windows-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Correr tests
        run: cargo test --release --locked --target ${{ matrix.target }}

  gui:
    name: Compilar GUI (Windows, artefacto de prueba)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Instalar Rust (target gnu + clippy)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: x86_64-pc-windows-gnu
          components: clippy

      - name: Clippy de la GUI (sin warnings)
        run: cargo clippy --release --locked --features gui --bin recupe_ghost_gui --target x86_64-pc-windows-gnu -- -D warnings

      - name: Compilar la GUI
        run: cargo build --release --locked --features gui --bin recupe_ghost_gui --target x86_64-pc-windows-gnu

      # Los tests de la maquina de estados de la GUI viven detras del feature `gui`, y el job
      # `test` de arriba corre SIN ese feature: sin este paso no se compilarian siquiera. Va aca
      # (Windows) y no en la matriz porque este job ya tiene el toolchain de la GUI, y Windows es
      # la plataforma que se distribuye. No abren ventana: prueban transiciones y guardas.
      - name: Tests de la GUI
        run: cargo test --release --locked --features gui --target x86_64-pc-windows-gnu

      # El CLI tambien, como artefacto: es la unica forma de probar en Windows real el escaneo de
      # un DISCO FISICO crudo (alineacion a 512 bytes), que no se puede verificar en Linux ni con
      # una imagen .img. Comparte la compilacion con el paso anterior, asi que cuesta poco.
      - name: Compilar el CLI
        run: cargo build --release --locked --bin recupe_ghost --target x86_64-pc-windows-gnu

      - name: Renombrar binarios
        shell: bash
        run: |
          cp target/x86_64-pc-windows-gnu/release/recupe_ghost_gui.exe recupe_ghost_gui.exe
          cp target/x86_64-pc-windows-gnu/release/recupe_ghost.exe recupe_ghost.exe

      - name: Subir artefacto descargable (GUI)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: recupe_ghost_gui-windows
          path: recupe_ghost_gui.exe

      - name: Subir artefacto descargable (CLI)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: recupe_ghost-cli-windows
          path: recupe_ghost.exe
